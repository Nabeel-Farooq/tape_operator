<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tape Operator</title>

    <meta
        name="description"
        content="Tape Operator movie player powered by Kinobox">

    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/favicon.png" sizes="32x32">

    <link rel="preconnect" href="https://analytics.kirlovon.dev">

    <link rel="stylesheet" href="style.css">

    <!-- Plausible Analytics -->
    <script
        defer
        data-domain="tapeop.dev"
        src="https://analytics.kirlovon.dev/js/script.manual.js">
    </script>

    <!-- Application Scripts -->
    <script defer src="config.js"></script>
    <script defer src="utils.js"></script>
    <script defer src="player.js"></script>
</head>

<body>

    <div id="container">

        <!-- Player Window -->
        <main id="player">

            <header id="header">

                <h1 id="title">...</h1>

                <button
                    id="watched-movies-toggle"
                    type="button"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                    aria-label="Watched movies"
                    disabled>
                    <span id="watched-movies-count"></span>
                    <span
                        id="watched-movies-arrow"
                        aria-hidden="true">
                    </span>
                </button>

                <div id="logo">
                    <img
                        src="assets/logo.svg"
                        alt="Tape Operator Logo"
                        decoding="async">
                </div>

                <div
                    id="watched-movies-panel"
                    class="hidden">

                    <input
                        id="watched-movies-search"
                        type="search"
                        placeholder="Search by name"
                        aria-label="Search watched movies"
                        autocomplete="off">

                    <div
                        id="watched-movies-list"
                        role="listbox">
                    </div>
                </div>

            </header>

            <section
                id="content"
                aria-live="polite">

                <img
                    src="assets/loading.svg"
                    alt="Loading..."
                    decoding="async">
            </section>

            <section
                id="sources"
                aria-live="polite">
            </section>

            <footer id="footer">

                <div>
                    Made with ♥ by
                    <a
                        href="https://github.com/Kirlovon"
                        target="_blank"
                        rel="noopener noreferrer">
                        Kirlovon
                    </a>.

                    Powered by
                    <a
                        href="https://github.com/Kirlovon/Tape-Operator"
                        target="_blank"
                        rel="noopener noreferrer">
                        Tape Operator
                    </a>.
                </div>

                <div>
                    <a
                        href="https://github.com/Kirlovon/Tape-Operator/issues"
                        target="_blank"
                        rel="noopener noreferrer">
                        Bug Report ↗
                    </a>

                    <span id="version"></span>
                </div>

            </footer>

        </main>

    </div>

    <!-- Background -->
    <div id="background" aria-hidden="true"></div>

    <!-- Templates -->

    <template id="initialization-error-message">
        <div class="message error">
            <p>
                Произошла ошибка во время запуска плеера.
                Проверьте консоль разработчика и сообщите об ошибке по
                <a
                    href="https://github.com/Kirlovon/Tape-Operator/issues"
                    target="_blank"
                    rel="noopener noreferrer">
                    этой ссылке ↗
                </a>.
                Я постараюсь быстро все исправить! 🙂
            </p>
        </div>
    </template>

    <template id="script-error-message">
        <div class="message error">
            <p>
                Похоже что плеер так и не был инициализирован.
                Проверьте, установлена ли у вас актуальная версия скрипта
                <a
                    href="https://github.com/Kirlovon/Tape-Operator/raw/main/userscript/tape-operator.user.js"
                    target="_blank"
                    rel="noopener noreferrer">
                    Tape Operator ↗
                </a>.
            </p>
        </div>
    </template>

    <template id="script-outdated-message">
        <div class="message warning">
            <p>
                Похоже что у вас установлена устаревшая версия скрипта —
                <b class="script-version"></b>.

                Рекомендуем обновить скрипт, перейдя по
                <a
                    href="https://github.com/Kirlovon/Tape-Operator/raw/main/userscript/tape-operator.user.js"
                    target="_blank"
                    rel="noopener noreferrer">
                    этой ссылке ↗
                </a>.
            </p>
        </div>
    </template>

    <template id="server-unavailable-message">
        <div class="message error">
            <p>
                Похоже что сервер в данный момент недоступен.
                Попробуйте обновить страницу или зайти позже.

                Приносим свои извинения. 🥲
            </p>
        </div>
    </template>

</body>

</html>
